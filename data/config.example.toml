# Easify — copy to ~/.config/easify/config.toml or ~/.easify/config.toml
# Or set EASIFY_CONFIG=/path/to/this/file
# Env vars (EASIFY_*) always override these values.
#
# Built-in defaults aim to keep features ON (live autocorrect, prefix capture, semantic
# snippets, accessibility inject try-first, enrich, prewarm, etc.). Double-space capture
# is OFF unless you opt in. Use this
# file to turn things off or tune them.

activation_prefix = true
# Double-space capture: off by default (sentence-spacing). Opt in explicitly:
# activation_double_space = true
# double_space_window_ms = 400
# palette_hotkey = "<ctrl>+<shift>+e>"
# tray = true
# capture_max_chars = 4000

trigger = "//"
# Close capture with the same delimiter (inline, no Enter). Set to "" for Enter-only submit.
capture_close = "//"
model = "phi3"
# ollama_url = "http://127.0.0.1:11434/api/generate"

live_autocorrect = true
live_fuzzy = true
live_cache = true
live_min_word_len = 3
live_fuzzy_threshold = 92
cooldown_ms = 150
phrase_buffer_max = 2

prewarm = true
live_cache_enrich = true
# startup_health = true
# startup_health_timeout = 3
perf = false
inject_prefer_type = true
inject_via_accessibility = true
# AX/UIA replace: true = last occurrence (rfind), false = first occurrence (find) when text repeats in field.
# inject_accessibility_match_last = true
# Require exactly one match in the focused field before AX/UIA replace (avoids wrong pane when focus moved).
# inject_accessibility_unique_match_only = true
clipboard_restore = true
metrics = false

# Drop SQLite cache rows older than N seconds (0 = never). Compares wall clock to created_at.
# cache_ttl_sec = 0

# live_enrich_min_len = 4
# live_enrich_max_per_minute = 12
# live_enrich_max_concurrent = 2
# live_enrich_queue_max = 32
# live_enrich_skip_same = true

# --- Phase 2 ---
# ai_provider = "ollama"
# openai_model = "gpt-4o-mini"
# anthropic_model = "claude-3-5-haiku-20241022"
context_include_focused_app = true
context_buffer_words = 8
# expansion_preview = false
# backend = "pynput"
# evdev_device = "/dev/input/event0"

# --- Phase 3 ---
semantic_snippets = true
# semantic_model = "sentence-transformers/all-MiniLM-L6-v2"
# semantic_min_similarity = 0.35
snippet_namespace_lenient = true
# Namespaced snippet keys like `slack:thanks` match when the focused app name contains `slack`.
# cache_promote_min_hits = 0
# cache_promote_sources = "ai,bg"
# undo_hotkey = ""
# undo_stack_max = 32
# ui_host = "127.0.0.1"
# ui_port = 8765
# ui_secret_token = "generate-a-long-random-string"
# `easify run` reload hook (snippet UI pushes here). 0 = disable.
# snippet_reload_listen_port = 8766
# Tray tooltip: after N seconds in “thinking”, show elapsed time + EASIFY_OLLAMA_TIMEOUT hint.
# tray_thinking_hint_after_s = 2
# cache_promote_max_keys = 500
# double_space_settle_ms = 0
# pre_inject_refocus = true
# inject_settle_ms = 55
# inject_settle_max_wait_ms = 3000
# inject_tail_via_cursor_left = true
