# Easify — copy to ~/.config/easify/config.toml or ~/.easify/config.toml
# Or set EASIFY_CONFIG=/path/to/this/file
# Env vars (EASIFY_*) always override these values.

activation_prefix = true
# activation_double_space = false
# double_space_window_ms = 400
# palette_hotkey = "<ctrl>+<shift>+e>"
# tray = true
# capture_max_chars = 4000

trigger = "///"
model = "phi3"
# ollama_url = "http://127.0.0.1:11434/api/generate"

live_autocorrect = false
live_fuzzy = true
live_cache = true
live_min_word_len = 3
live_fuzzy_threshold = 92
cooldown_ms = 150
phrase_buffer_max = 0

prewarm = false
# startup_health = true
perf = false
inject_prefer_type = true
metrics = false

# Drop SQLite cache rows older than N seconds (0 = never). Compares wall clock to created_at.
# cache_ttl_sec = 0

# After live deterministic miss, asynchronously call Ollama to fill live-cache keys (never blocks typing).
# live_cache_enrich = false
# live_enrich_min_len = 4
# live_enrich_max_per_minute = 12
# live_enrich_max_concurrent = 2
# live_enrich_queue_max = 32
# live_enrich_skip_same = true

